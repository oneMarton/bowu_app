[theme]
# 强制全局使用暗黑模式，彻底屏蔽手机白天的浅色主题
base = "dark"

# 拨雾计划品牌主色调（赛博青亮色）
primaryColor = "#00E5FF"

# 极度深邃的背景色（比纯黑更有质感）
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1E2130"

# 全局文字强制为高亮白色，确保无论何时都清晰可见
textColor = "#FAFAFA"
font = "sans serif"

[client]
# 极简模式：隐藏右上角的多余菜单和开发者工具，打造纯净的品牌专属产品
toolbarMode = "minimal"

# 安全锁：关闭向前端用户展示详细的错误代码，防止底层逻辑和机密泄露
showErrorDetails = false
